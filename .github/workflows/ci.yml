name: CI

on:
  push:
    branches: [main, devel]
    tags: ['v*']
    paths-ignore:
      - 'mydocs/**'
      - 'docs/**'
      - 'samples/**'
      - 'assets/**'
      - '*.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
      - '.github/CODE_OF_CONDUCT.md'
      - '.github/SECURITY.md'
      - '.github/pull_request_template.md'
      - '.github/dependabot.yml'
      - 'rhwp-logo.*'
  pull_request:
    branches: [main, devel]
    paths-ignore:
      - 'docs/**'
      - 'samples/**'
      - 'assets/**'
      - '*.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
      - '.github/CODE_OF_CONDUCT.md'
      - '.github/SECURITY.md'
      - '.github/pull_request_template.md'
      - '.github/dependabot.yml'
      - 'rhwp-logo.*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# [Task #1192 F] 같은 PR 에 새 push 가 오면 진행 중 run 을 취소해 중복 실행 제거.
# cancel-in-progress 는 PR 이벤트에서만 활성화 — devel/main push 머지 검증 run 은 보존.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  preflight:
    name: CI preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
      pull-requests: read
    outputs:
      fast_pass: ${{ steps.detect.outputs.fast_pass || 'false' }}
      reason: ${{ steps.detect.outputs.reason || 'preflight-unavailable' }}
      candidate_sha: ${{ steps.detect.outputs.candidate_sha || '' }}
      frontend_required: ${{ steps.frontend-impact.outputs.frontend_required || 'true' }}
      frontend_reason: ${{ steps.frontend-impact.outputs.frontend_reason || 'frontend-detection-unavailable' }}

    steps:
      - name: Detect review-only fast pass
        id: detect
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const allowedConclusions = new Set(['success', 'skipped', 'neutral']);
            const { owner, repo } = context.repo;

            function setResult(fastPass, reason, candidateSha = '') {
              core.setOutput('fast_pass', fastPass ? 'true' : 'false');
              core.setOutput('reason', reason);
              core.setOutput('candidate_sha', candidateSha);
              core.info(`fast_pass=${fastPass} reason=${reason} candidate_sha=${candidateSha}`);
            }

            function isAllowedReviewPath(file) {
              const filename = file.filename;
              if (filename.startsWith('mydocs/')) {
                return true;
              }
              if (file.status !== 'added') {
                return false;
              }
              return isReviewReferencePath(filename);
            }

            function isReviewReferencePath(filename) {
              return (
                filename.startsWith('samples/')
                && (
                  filename.endsWith('.hwp')
                  || filename.endsWith('.hwpx')
                  || filename.endsWith('.pdf')
                  || filename.endsWith('.png')
                )
              ) || (filename.startsWith('pdf/') && filename.endsWith('.pdf'));
            }

            function reviewOnlyLabel(files) {
              const hasReferenceArtifact = files.some((file) => (
                file.status === 'added'
                && isReviewReferencePath(file.filename)
              ));
              return hasReferenceArtifact ? 'review-reference-only' : 'mydocs-only';
            }

            function latestRun(runs) {
              return runs
                .slice()
                .sort((a, b) => {
                  const bTime = Date.parse(b.completed_at || b.started_at || b.created_at || 0);
                  const aTime = Date.parse(a.completed_at || a.started_at || a.created_at || 0);
                  return bTime - aTime;
                })[0];
            }

            try {
              if (context.eventName !== 'pull_request') {
                setResult(false, 'not-pull-request');
                return;
              }

              const pr = context.payload.pull_request;
              const prFiles = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100,
              });
              if (prFiles.length > 0 && prFiles.every((file) => isAllowedReviewPath(file))) {
                core.info(`all PR files are review-only; using base SHA ${pr.base.sha}`);
                setResult(true, 'all-review-only-no-code-impact', pr.base.sha);
                return;
              }

              const commits = await github.paginate(github.rest.pulls.listCommits, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100,
              });

              if (commits.length === 0) {
                setResult(false, 'no-pr-commits');
                return;
              }

              let trailingReviewOnlyCommits = 0;
              let candidateSha = '';

              for (let index = commits.length - 1; index >= 0; index -= 1) {
                const sha = commits[index].sha;
                const { data: commit } = await github.rest.repos.getCommit({
                  owner,
                  repo,
                  ref: sha,
                });
                const files = commit.files || [];

                // The commit endpoint may truncate very large file lists. Fall back to full CI.
                if (files.length === 0 || files.length >= 300) {
                  setResult(false, `unusable-file-list:${sha}`);
                  return;
                }

                const reviewOnly = files.every((file) => isAllowedReviewPath(file));
                if (reviewOnly) {
                  if ((commit.parents || []).length !== 1) {
                    setResult(false, `${reviewOnlyLabel(files)}-merge-commit:${sha}`);
                    return;
                  }
                  trailingReviewOnlyCommits += 1;
                  continue;
                }

                candidateSha = sha;
                break;
              }

              if (trailingReviewOnlyCommits === 0) {
                setResult(false, 'no-trailing-review-only-commits');
                return;
              }
              if (!candidateSha) {
                candidateSha = pr.base.sha;
                core.info(`all PR commits are review-only; using base SHA ${candidateSha}`);
                setResult(true, 'all-review-only-no-code-impact', candidateSha);
                return;
              }

              const checkRuns = await github.paginate(github.rest.checks.listForRef, {
                owner,
                repo,
                ref: candidateSha,
                per_page: 100,
              });
              const buildRun = latestRun(checkRuns.filter((run) => (
                run.name === 'Build & Test'
                && run.app?.slug === 'github-actions'
              )));

              if (!buildRun) {
                setResult(false, `missing-build-and-test:${candidateSha}`, candidateSha);
                return;
              }
              if (buildRun.status !== 'completed') {
                setResult(false, `build-and-test-not-completed:${buildRun.status}`, candidateSha);
                return;
              }
              if (!allowedConclusions.has(buildRun.conclusion)) {
                setResult(false, `build-and-test-not-green:${buildRun.conclusion}`, candidateSha);
                return;
              }

              setResult(true, `build-and-test-green:${buildRun.conclusion}`, candidateSha);
            } catch (error) {
              core.warning(`CI preflight failed; running full CI. ${error.message}`);
              setResult(false, 'preflight-error');
            }

      - name: Detect frontend impact
        id: frontend-impact
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const directoryPrefixes = [
              'rhwp-studio/',
              'rhwp-chrome/',
              'rhwp-firefox/',
              'rhwp-safari/',
              'rhwp-vscode/',
              'rhwp-shared/',
              'npm/editor/',
              'web/',
            ];

            function setResult(required, reason) {
              core.setOutput('frontend_required', required ? 'true' : 'false');
              core.setOutput('frontend_reason', reason);
              core.info(`frontend_required=${required} frontend_reason=${reason}`);
            }

            function isFrontendPath(filename) {
              if (directoryPrefixes.some((prefix) => filename.startsWith(prefix))) {
                return true;
              }
              if (filename === 'src/wasm_api.rs' || filename === '.github/workflows/ci.yml') {
                return true;
              }
              return filename.startsWith('scripts/frontend-') && filename.endsWith('.mjs');
            }

            function evaluateFiles(files) {
              for (const file of files) {
                for (const filename of [file.filename, file.previous_filename]) {
                  if (filename && isFrontendPath(filename)) {
                    setResult(true, `frontend-path:${filename}`);
                    return;
                  }
                }
              }
              setResult(false, 'no-frontend-path');
            }

            try {
              if (context.eventName === 'pull_request') {
                const files = await github.paginate(github.rest.pulls.listFiles, {
                  owner,
                  repo,
                  pull_number: context.payload.pull_request.number,
                  per_page: 100,
                });
                // The API documents at most 3,000 PR files. Treat the boundary as truncated.
                if (files.length === 0 || files.length >= 3000) {
                  setResult(true, 'pr-file-list-empty-or-unusable');
                  return;
                }
                evaluateFiles(files);
                return;
              }

              if (context.eventName === 'push') {
                if (context.ref.startsWith('refs/tags/')) {
                  setResult(true, 'manual-or-tag');
                  return;
                }

                const before = context.payload.before || '';
                const after = context.payload.after || context.sha;
                if (!before || /^0+$/.test(before)) {
                  setResult(true, 'push-zero-before');
                  return;
                }

                const { data: comparison } = await github.rest.repos.compareCommitsWithBasehead({
                  owner,
                  repo,
                  basehead: `${before}...${after}`,
                });
                const files = comparison.files || [];
                // Compare exposes at most 300 files. The boundary may be truncated.
                if (files.length === 0 || files.length >= 300) {
                  setResult(true, 'push-file-list-empty-or-unusable');
                  return;
                }
                evaluateFiles(files);
                return;
              }

              if (context.eventName === 'workflow_dispatch') {
                setResult(true, 'manual-or-tag');
                return;
              }

              setResult(true, `unsupported-event:${context.eventName}`);
            } catch (error) {
              core.warning(`Frontend impact detection failed; running frontend gates. ${error.message}`);
              setResult(true, 'detection-error');
            }

  build-default-feature-tests:
    name: Build default-feature tests
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ always() && needs.preflight.outputs.fast_pass != 'true' }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      # [Task #1109 / #1192 C] ubuntu-latest runner 의 미사용 사전 설치 toolchain 제거하여
      # 테스트 빌드 시 디스크 한도 초과를 줄인다.
      # [#1192] 캐시 정상 작동 확인 후 "크고 빠른" 항목(android/dotnet)만 남기고 축소.
      # 느린 docker prune --all / apt clean / ghc / CodeQL 정리는 제거. df -h 로 여유 확인.
      - name: Free disk space (remove unused pre-installed toolchains)
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          df -h

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Restore cargo registry & build cache
        id: cargo_cache_restore
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      # [Task #1849] PR is release-test full regression. devel push keeps this Build
      # step as release smoke, while test steps below use release-test. main/tag/manual
      # keep full release tests.
      - name: Build
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "profile=release-test event=${GITHUB_EVENT_NAME} ref=${GITHUB_REF}"
            cargo build --profile release-test --verbose
          else
            echo "profile=release event=${GITHUB_EVENT_NAME} ref=${GITHUB_REF} role=release-smoke-or-full"
            cargo build --release --verbose
          fi

      # [Task #1667] `cargo test --tests` covers all default-feature test=true
      # targets, including the rhwp lib test executable. Keep one default-feature
      # test step here so the same lib tests are not rerun by a separate --lib step.
      - name: Run default-feature tests
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]] || [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/devel" ]]; then
            echo "profile=release-test event=${GITHUB_EVENT_NAME} ref=${GITHUB_REF}"
            cargo test --profile release-test --tests --verbose
          else
            echo "profile=release event=${GITHUB_EVENT_NAME} ref=${GITHUB_REF}"
            cargo test --release --tests --verbose
          fi

      - name: Check WASM target
        run: cargo check --target wasm32-unknown-unknown --lib

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Save cargo registry & build cache
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/devel' || github.ref == 'refs/heads/main') && steps.cargo_cache_restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

  native-skia-tests:
    name: Native Skia tests
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ always() && needs.preflight.outputs.fast_pass != 'true' }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      # [Task #1109 / #1192 C] ubuntu-latest runner 의 미사용 사전 설치 toolchain 제거하여
      # 테스트 빌드 시 디스크 한도 초과를 줄인다.
      # [#1192] 캐시 정상 작동 확인 후 "크고 빠른" 항목(android/dotnet)만 남기고 축소.
      # 느린 docker prune --all / apt clean / ghc / CodeQL 정리는 제거. df -h 로 여유 확인.
      - name: Free disk space (remove unused pre-installed toolchains)
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          df -h

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1

      - name: Restore cargo registry & build cache
        id: cargo_cache_restore
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install native Skia runtime packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-dejavu-core \
            libfontconfig1-dev \
            libfreetype6-dev

      - name: Native Skia tests
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]] || [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/devel" ]]; then
            echo "profile=release-test event=${GITHUB_EVENT_NAME} ref=${GITHUB_REF}"
            cargo test --profile release-test --features native-skia skia --lib --verbose
          else
            echo "profile=release event=${GITHUB_EVENT_NAME} ref=${GITHUB_REF}"
            cargo test --release --features native-skia skia --lib --verbose
          fi

  frontend-package-gates:
    name: Frontend package gates
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ always() && needs.preflight.result == 'success' && needs.preflight.outputs.fast_pass != 'true' && needs.preflight.outputs.frontend_required == 'true' }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Restore frontend WASM cargo cache
        id: frontend_wasm_cargo_cache_restore
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-frontend-wasm-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-frontend-wasm-cargo-

      - name: Build fresh WASM package for frontend gates
        run: wasm-pack build --target web --dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            rhwp-studio/package-lock.json
            rhwp-chrome/package-lock.json
            rhwp-firefox/package-lock.json
            rhwp-vscode/package-lock.json

      - name: Install frontend package dependencies
        run: |
          npm --prefix rhwp-studio ci
          npm --prefix rhwp-chrome ci
          npm --prefix rhwp-firefox ci
          npm --prefix rhwp-vscode ci

      - name: Verify WASM bindings and editor embed contract
        run: node --test scripts/frontend-wasm-bindings.test.mjs scripts/frontend-editor-embed.test.mjs

      - name: Run editor package tests when declared
        run: npm --prefix npm/editor test --if-present

      - name: Run shared and extension service worker tests
        run: node --test rhwp-shared/sw/*.test.js rhwp-chrome/sw/*.test.mjs rhwp-firefox/sw/*.test.mjs

      - name: Run Studio unit tests
        run: npm --prefix rhwp-studio run test

      - name: Build Studio
        run: npm --prefix rhwp-studio run build

      - name: Build browser extensions
        run: |
          npm --prefix rhwp-chrome run build
          npm --prefix rhwp-firefox run build

      - name: Verify extension distributions
        run: node --test scripts/frontend-extension-dist.test.mjs

      - name: Compile VS Code extension
        run: npm --prefix rhwp-vscode run compile

      - name: Save frontend WASM cargo cache
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/devel' || github.ref == 'refs/heads/main') && steps.frontend_wasm_cargo_cache_restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-frontend-wasm-cargo-${{ hashFiles('**/Cargo.lock') }}

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs:
      - preflight
      - build-default-feature-tests
      - native-skia-tests
      - frontend-package-gates
    if: ${{ always() }}
    permissions:
      contents: read

    steps:
      - name: Check Build & Test worker results
        env:
          PREFLIGHT_RESULT: ${{ needs.preflight.result }}
          FAST_PASS: ${{ needs.preflight.outputs.fast_pass }}
          FRONTEND_REQUIRED: ${{ needs.preflight.outputs.frontend_required }}
          FRONTEND_REASON: ${{ needs.preflight.outputs.frontend_reason }}
          BUILD_DEFAULT_RESULT: ${{ needs['build-default-feature-tests'].result }}
          NATIVE_SKIA_RESULT: ${{ needs['native-skia-tests'].result }}
          FRONTEND_RESULT: ${{ needs['frontend-package-gates'].result }}
        run: |
          printf 'preflight=%s\n' "${PREFLIGHT_RESULT}"
          printf 'fast_pass=%s\n' "${FAST_PASS}"
          printf 'frontend_required=%s\n' "${FRONTEND_REQUIRED}"
          printf 'frontend_reason=%s\n' "${FRONTEND_REASON}"
          printf 'build_default=%s\n' "${BUILD_DEFAULT_RESULT}"
          printf 'native_skia=%s\n' "${NATIVE_SKIA_RESULT}"
          printf 'frontend=%s\n' "${FRONTEND_RESULT}"

          if [[ "${PREFLIGHT_RESULT}" != "success" ]]; then
            echo "::error::CI preflight did not succeed: ${PREFLIGHT_RESULT}"
            exit 1
          fi

          if [[ "${FAST_PASS}" == "true" ]]; then
            echo "CI preflight fast-pass accepted."
            exit 0
          fi

          failed=0
          if [[ "${BUILD_DEFAULT_RESULT}" != "success" ]]; then
            echo "::error::Build default-feature tests result: ${BUILD_DEFAULT_RESULT}"
            failed=1
          fi
          if [[ "${NATIVE_SKIA_RESULT}" != "success" ]]; then
            echo "::error::Native Skia tests result: ${NATIVE_SKIA_RESULT}"
            failed=1
          fi
          if [[ "${FRONTEND_REQUIRED}" == "false" ]]; then
            if [[ "${FRONTEND_RESULT}" != "skipped" ]]; then
              echo "::error::Frontend gates should be skipped, got: ${FRONTEND_RESULT}"
              failed=1
            fi
          elif [[ "${FRONTEND_RESULT}" != "success" ]]; then
            echo "::error::Frontend package gates result: ${FRONTEND_RESULT}"
            failed=1
          fi
          exit "${failed}"

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v5

      # [Task #1109 / #1192 C] wasm-build job 도 build-and-test 와 동일 축소 패턴.
      # "크고 빠른" 항목(android/dotnet)만 제거. df -h 로 여유 확인.
      - name: Free disk space (remove unused pre-installed toolchains)
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          df -h

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-wasm-

      - name: Build WASM
        run: wasm-pack build --target web --release

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rhwp-wasm-pkg
          path: pkg/
          retention-days: 30
