name: Render Diff

on:
  pull_request:
    branches: [main, devel]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/paint/**'
      - 'src/renderer/**'
      - 'src/document_core/queries/rendering.rs'
      - 'src/wasm_api.rs'
      - 'src/main.rs'
      - 'assets/fonts/**'
      - 'scripts/renderer_baseline.py'
      - 'scripts/renderer_baseline_manifest.json'
      - 'scripts/generate_font_glyph_payload_fixture.py'
      - 'scripts/generate_exact_face_collection_fixture.py'
      - 'scripts/generate_font_native_hwpx_fixture.py'
      - 'scripts/requirements-font-fixtures.txt'
      - 'samples/render-p35-font-native-bitmap.hwpx'
      - 'tests/fixtures/fonts/**'
      - 'docs/canvaskit-parity-implementation.md'
      - 'docs/text-ir-v2.md'
      - 'rhwp-studio/**'
      - 'mydocs/**'
      - '.github/workflows/render-diff.yml'
  workflow_dispatch:
    inputs:
      fixtures:
        description: 'Comma-separated sample files under rhwp-studio/public/samples'
        required: false
        type: string
      max-pages:
        description: 'Pages per fixture to compare, or all'
        required: false
        default: '1'
        type: string
      full-suite:
        description: 'Run all built-in sample fixtures'
        required: false
        default: false
        type: boolean
      write-images:
        description: 'Write Canvas PNG artifacts even when cases pass. PDF report artifacts are always retained.'
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always

# [Task #1192 F] 같은 PR 에 새 push 가 오면 진행 중 run 을 취소해 중복 실행 제거.
# render-diff 는 pull_request 트리거 위주 — cancel-in-progress 는 PR 이벤트 한정.
concurrency:
  group: render-diff-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  preflight:
    name: Render Diff preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
      pull-requests: read
    outputs:
      fast_pass: ${{ steps.detect.outputs.fast_pass || 'false' }}
      reason: ${{ steps.detect.outputs.reason || 'preflight-unavailable' }}
      candidate_sha: ${{ steps.detect.outputs.candidate_sha || '' }}

    steps:
      - name: Detect review-only fast pass
        id: detect
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const allowedConclusions = new Set(['success', 'skipped', 'neutral']);
            const { owner, repo } = context.repo;

            function setResult(fastPass, reason, candidateSha = '') {
              core.setOutput('fast_pass', fastPass ? 'true' : 'false');
              core.setOutput('reason', reason);
              core.setOutput('candidate_sha', candidateSha);
              core.info(`fast_pass=${fastPass} reason=${reason} candidate_sha=${candidateSha}`);
            }

            function isAllowedReviewPath(file) {
              const filename = file.filename;
              if (filename.startsWith('mydocs/')) {
                return true;
              }
              if (file.status !== 'added') {
                return false;
              }
              return isReviewReferencePath(filename);
            }

            function isReviewReferencePath(filename) {
              return (
                filename.startsWith('samples/')
                && (
                  filename.endsWith('.hwp')
                  || filename.endsWith('.hwpx')
                  || filename.endsWith('.pdf')
                  || filename.endsWith('.png')
                )
              ) || (filename.startsWith('pdf/') && filename.endsWith('.pdf'));
            }

            function reviewOnlyLabel(files) {
              const hasReferenceArtifact = files.some((file) => (
                file.status === 'added'
                && isReviewReferencePath(file.filename)
              ));
              return hasReferenceArtifact ? 'review-reference-only' : 'mydocs-only';
            }

            function latestRun(runs) {
              return runs
                .slice()
                .sort((a, b) => {
                  const bTime = Date.parse(b.completed_at || b.started_at || b.created_at || 0);
                  const aTime = Date.parse(a.completed_at || a.started_at || a.created_at || 0);
                  return bTime - aTime;
                })[0];
            }

            try {
              if (context.eventName !== 'pull_request') {
                setResult(false, 'not-pull-request');
                return;
              }

              const pr = context.payload.pull_request;
              const prFiles = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100,
              });
              if (prFiles.length > 0 && prFiles.every((file) => isAllowedReviewPath(file))) {
                core.info(`all PR files are review-only; using base SHA ${pr.base.sha}`);
                setResult(true, 'all-review-only-no-render-impact', pr.base.sha);
                return;
              }

              const commits = await github.paginate(github.rest.pulls.listCommits, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100,
              });

              if (commits.length === 0) {
                setResult(false, 'no-pr-commits');
                return;
              }

              let trailingReviewOnlyCommits = 0;
              let candidateSha = '';

              for (let index = commits.length - 1; index >= 0; index -= 1) {
                const sha = commits[index].sha;
                const { data: commit } = await github.rest.repos.getCommit({
                  owner,
                  repo,
                  ref: sha,
                });
                const files = commit.files || [];

                // The commit endpoint may truncate very large file lists. Fall back to full Render Diff.
                if (files.length === 0 || files.length >= 300) {
                  setResult(false, `unusable-file-list:${sha}`);
                  return;
                }

                const reviewOnly = files.every((file) => isAllowedReviewPath(file));
                if (reviewOnly) {
                  if ((commit.parents || []).length !== 1) {
                    setResult(false, `${reviewOnlyLabel(files)}-merge-commit:${sha}`);
                    return;
                  }
                  trailingReviewOnlyCommits += 1;
                  continue;
                }

                candidateSha = sha;
                break;
              }

              if (trailingReviewOnlyCommits === 0) {
                setResult(false, 'no-trailing-review-only-commits');
                return;
              }
              if (!candidateSha) {
                candidateSha = pr.base.sha;
                core.info(`all PR commits are review-only; using base SHA ${candidateSha}`);
                setResult(true, 'all-review-only-no-render-impact', candidateSha);
                return;
              }

              const checkRuns = await github.paginate(github.rest.checks.listForRef, {
                owner,
                repo,
                ref: candidateSha,
                per_page: 100,
              });
              const renderDiffRun = latestRun(checkRuns.filter((run) => (
                run.name === 'Canvas visual diff'
                && run.app?.slug === 'github-actions'
              )));

              if (!renderDiffRun) {
                setResult(false, `missing-canvas-visual-diff:${candidateSha}`, candidateSha);
                return;
              }
              if (renderDiffRun.status !== 'completed') {
                setResult(false, `canvas-visual-diff-not-completed:${renderDiffRun.status}`, candidateSha);
                return;
              }
              if (!allowedConclusions.has(renderDiffRun.conclusion)) {
                setResult(false, `canvas-visual-diff-not-green:${renderDiffRun.conclusion}`, candidateSha);
                return;
              }

              setResult(true, `canvas-visual-diff-green:${renderDiffRun.conclusion}`, candidateSha);
            } catch (error) {
              core.warning(`Render Diff preflight failed; running full Render Diff. ${error.message}`);
              setResult(false, 'preflight-error');
            }

  canvas-visual-diff:
    name: Canvas visual diff
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ always() && needs.preflight.outputs.fast_pass != 'true' }}
    permissions:
      contents: read
    env:
      RHWP_CHROMIUM_BUILD_ID: '1660786'

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install PDF raster tools
        continue-on-error: true
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # [Task #1667] Render Diff is PR-heavy; pull_request caches are scoped to
      # refs/pull/* and are not reused by other PRs. Keep PR runs restore-only,
      # and allow only trusted manual devel/main seed runs to save a cache.
      - name: Restore cargo registry & build cache
        id: render_diff_cargo_cache_restore
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-render-diff-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-render-diff-cargo-

      - name: Build WASM package
        run: wasm-pack build --target web --dev

      - name: Build native CLI for PDF report
        continue-on-error: true
        run: cargo build --bin rhwp

      - name: Save cargo registry & build cache
        if: ${{ github.event_name == 'workflow_dispatch' && (github.ref == 'refs/heads/devel' || github.ref == 'refs/heads/main') && steps.render_diff_cargo_cache_restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-render-diff-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Studio dependencies
        working-directory: rhwp-studio
        run: npm ci

      - name: Install Chromium
        working-directory: rhwp-studio
        run: |
          browser_path=$(npx @puppeteer/browsers install chromium@${RHWP_CHROMIUM_BUILD_ID} --path .cache/puppeteer --format '{{path}}' | tail -n 1)
          browser_path=$(realpath "$browser_path")
          echo "CHROME_PATH=$browser_path" >> "$GITHUB_ENV"

      - name: Check render diff script syntax
        working-directory: rhwp-studio
        run: |
          node --check e2e/renderer-contract.test.mjs
          node --check e2e/issue-2214-page-local-repaint.test.mjs
          node --check e2e/canvaskit-font-coverage.test.mjs
          node --check e2e/canvas-render-diff.test.mjs
          node --check e2e/pdf-render-diff-report.mjs
          node --check e2e/renderer-baseline.mjs
          node --check e2e/renderer-baseline-native-diff.mjs
          node e2e/renderer-baseline-native-diff.mjs --self-test
          node --check e2e/run-render-diff.mjs
          python3 -m py_compile ../scripts/renderer_baseline.py
          npm run e2e:renderer-contract
          npm run e2e:canvaskit-font-coverage

      - name: Run canvas visual diff and PDF report
        working-directory: rhwp-studio
        env:
          VITE_PORT: 7700
          RHWP_RENDER_DIFF_FILES: ${{ inputs.fixtures || '' }}
          RHWP_RENDER_DIFF_MAX_PAGES: ${{ inputs['max-pages'] || '1' }}
          RHWP_RENDER_DIFF_ALL: ${{ inputs['full-suite'] == true && '1' || '0' }}
          RHWP_RENDER_DIFF_WRITE_IMAGES: ${{ inputs['write-images'] == true && '1' || '0' }}
          RHWP_RENDER_DIFF_PDF: '1'
          RHWP_RENDER_DIFF_PDF_WRITE_IMAGES: '1'
          RHWP_RENDER_DIFF_RHWP_BIN: ../target/debug/rhwp
        run: npm run e2e:render-diff:ci

      - name: Run selected CanvasKit readiness gate
        run: >-
          python3 scripts/renderer_baseline.py
          --profiles screen
          --browser-mode headless
          --readiness-only
          --output output/renderer-baseline/canvaskit-readiness

      - name: Add render diff summary
        if: always()
        working-directory: rhwp-studio
        run: |
          for summary in \
            e2e/screenshots/render-diff/summary.md \
            e2e/screenshots/render-diff/pdf-summary.md \
            ../output/renderer-baseline/canvaskit-readiness/baseline-report.md
          do
            if [ -f "$summary" ]; then
              cat "$summary" >> "$GITHUB_STEP_SUMMARY"
              printf '\n\n' >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Upload render diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-diff-artifacts
          path: |
            rhwp-studio/e2e/screenshots/render-diff/
            output/e2e/
            output/renderer-baseline/canvaskit-readiness/
            target/rhwp-studio-vite.log
          if-no-files-found: ignore
          retention-days: 14
